  <style>
    /* ========== CSS 变量（与 trading-list.html 一致）========== */
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #1c2128;
      --bg-hover: #21262d;
      --bg-card: #1a1f26;
      --border: #30363d;
      --border-light: #3d444d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent-blue: #58a6ff;
      --accent-cyan: #39d353;
      --accent-green: #3fb950;
      --accent-red: #f85149;
      --accent-orange: #d29922;
      --accent-purple: #a371f7;
      --accent-yellow: #f0c000;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', Helvetica, Arial, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ========== 顶部导航栏 ========== */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 48px;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 100;
    }

    .top-nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-right: 24px;
      border-right: 1px solid var(--border);
      margin-right: 8px;
      text-decoration: none;
    }

    .top-nav-logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #fff;
      font-weight: 600;
    }

    .top-nav-logo-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-cyan);
    }

    .top-nav-menu {
      display: flex;
      align-items: center;
      flex: 1;
      overflow-x: auto;
      gap: 4px;
    }

    .top-nav-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.15s;
      white-space: nowrap;
      position: relative;
      text-decoration: none;
    }

    .top-nav-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .top-nav-item.active {
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent-blue);
    }

    .top-nav-item-icon {
      font-size: 14px;
    }

    .top-nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      padding-left: 16px;
      border-left: 1px solid var(--border);
    }

    .top-nav-user {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .top-nav-avatar {
      width: 28px;
      height: 28px;
      background: var(--accent-purple);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #fff;
    }

    .top-nav-username {
      font-size: 12px;
      color: var(--text-secondary);
    }

    /* ========== 主内容区 ========== */
    .main-content {
      padding: 68px 20px 20px 20px;
      min-height: 100vh;
    }

    /* ========== 页面标题 ========== */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-title h1 {
      font-size: 20px;
      font-weight: 600;
    }

    /* ========== 空状态 ========== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 40px;
      text-align: center;
    }

    .empty-state-icon {
      width: 120px;
      height: 120px;
      background: var(--bg-secondary);
      border: 2px dashed var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 24px;
      color: var(--text-muted);
    }

    .empty-state-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .empty-state-desc {
      font-size: 14px;
      color: var(--text-secondary);
      max-width: 400px;
      line-height: 1.6;
    }

    /* ========== 全局水印 ========== */
    .watermark {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99999;
    }
  </style>
</head>

<body>

      <a class="top-nav-item" href="risk-management.html">

      </a>

    <div class="top-nav-right">
      <!-- 数据源状态 -->
      <div style="display:flex;align-items:center;gap:6px;padding-right:12px;border-right:1px solid var(--border);">
        <span style="width:6px;height:6px;background:var(--accent-green);border-radius:50%;"></span>

  <!-- 主内容区 -->
  <div class="main-content">
    <div class="page-header">
      <div class="page-title">
        <h1>结算管理</h1>
      </div>
    </div>

    <!-- 空状态占位 -->
    <div class="empty-state">
      <div class="empty-state-icon">💰</div>

        该模块暂未开盘，后续将支持比赛结算、注单结算、盈亏统计等功能。
      </div>
    </div>
  </div>
  <script>
    // ========== 全局水印 ==========
    (function () {
      const WATERMARK_CONFIG = {
        text: '仅供内部使用 telegram：nnns1992',
        tileWidth: 520,
        tileHeight: 360,
        rotateDeg: -24,
        fontSize: 16,
        lineGap: 10,
        refreshEachMinute: true
      };

      function pad2(n) {
        return String(n).padStart(2, '0');
      }

      function formatLocal(d) {
        return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      }

      function buildTile(line1, line2) {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const w = WATERMARK_CONFIG.tileWidth;
        const h = WATERMARK_CONFIG.tileHeight;
        const canvas = document.createElement('canvas');
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        const ctx = canvas.getContext('2d', { alpha: true });
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, w, h);
        ctx.globalAlpha = 0.22;
        ctx.fillStyle = 'rgb(130, 130, 130)';
        ctx.font = `${WATERMARK_CONFIG.fontSize}px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif`;
        ctx.textBaseline = 'middle';
        ctx.save();
        ctx.translate(w / 2, h / 2);
        ctx.rotate((WATERMARK_CONFIG.rotateDeg * Math.PI) / 180);
        ctx.translate(-w / 2, -h / 2);
        const x = 28;
        const y = h / 2 - 10;
        ctx.fillText(line1, x, y);
        ctx.fillText(line2, x, y + WATERMARK_CONFIG.fontSize + WATERMARK_CONFIG.lineGap);
        ctx.restore();
        return canvas.toDataURL('image/png');
      }

      function refreshWatermark() {
        const el = document.querySelector('.watermark');
        if (!el) return;
        const now = new Date();
        const url = buildTile(WATERMARK_CONFIG.text, formatLocal(now));
        el.style.backgroundImage = `url(${url})`;
        el.style.backgroundSize = `${WATERMARK_CONFIG.tileWidth}px ${WATERMARK_CONFIG.tileHeight}px`;
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', refreshWatermark);
      } else {
        refreshWatermark();
      }

      if (WATERMARK_CONFIG.refreshEachMinute) {
        setInterval(refreshWatermark, 60 * 1000);
      }
    })();
  </script>
  <div class="watermark"></div>
</body>

</html>
